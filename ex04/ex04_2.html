<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex04_2</title>
</head>
<body>
    <script>
        const products = [
            { name: "Pen", price: 1000 },
            { name: "Book", price: 1200 },
            { name: "Bag", price: 20000 },
            { name: "Laptop", price: 2000000 }
        ];

        const salePrice = products
                            .filter(item => item.price >= 5000)
                            .map(item => item.price * 0.8)
                            .reduce((sum,  price) => sum + price, 0);
        console.log(salePrice);
    </script>
</body>
</html>
