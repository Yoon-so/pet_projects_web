<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>실습 2-4</title>
    <style>
      .box{
        width:300px;
        height:70px;     
        margin:0 auto;
        text-shadow: 4px 3px 10px rgb(0, 0, 0);
      }
			#style1 {        
        background-color:#2121f4;          
        color:white;      
      }    
      #style2 {
        background: linear-gradient(45deg,#c500c5, #4c0067);
        color: white;   
          
      }    
      #style3 {
        background: radial-gradient(ellipse, #10004a, #5f1bff);  
        color: white;      
      }    
      h1 {
        text-align: center;
        line-height: 70px;
      }
      #basic{        
      text-shadow: 4px, 3px, 10px, yellow;
      }
    </style>
  </head>
  <body>
    <div class="box" id="style1">
      <h1 id="basic">웹 개발 기초</h1>
    </div>
    <div class="box" id="style2">
      <h1>웹 개발 중급</h1>
    </div>
    <div class="box" id="style3">
      <h1>웹 개발 고급</h1>
    </div>
  </body>
</html>
