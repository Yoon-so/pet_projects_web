<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[예카테리나] - 사용자 등록</title>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <fieldset>
            <legend>기본 정보 (Essential)</legend><br/>
            <form>
                <label for="fid">아이디:</label><br/>
                <input type="text" id="fid" name="id" placeholder="4~12 영문/숫자" required><br><br>

                <label for="fpassword">비밀번호:</label><br/>
                <input type="password" id="fpassword" name="password" required><br><br>

                <label for="femail">이메일:</label><br/>
                <input type="email" id="femail" name="email" required><br><br>

        
            </fieldset><br/>
            <fieldset>
                <legend>부가 정보 (Optional)</legend>
                <label for="fphone">연락처:</label><br>
                <input type="tel" id="fphone" name="phone" placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br><br>
                <label for="finterest">관심 분야:</label><br>
                <input type="checkbox" id="html" name="interest" value="html">
                <label for="html">HTML5</label>
                <input type="checkbox" id="css" name="interest" value="css">
                <label for="css">CSS3</label>
                <input type="checkbox" id="js" name="interest" value="js">
                <label for="js">JavaScript</label><br><br>
                <label for="ran">숙련도:</label><br>
                <input type="range" id="ran" name="ran" min="0" max="50"><br/>
            </fieldset><br>
            <input type="submit" value="가입 신청">
            <input type="reset" value="초기화">
        </form>
    </main>
    <footer>
        <br>
        <a href="index.html">홈으로</a>
        <p>2026 Web Programming Course. All rights reserved.</p>
    </footer>
</body>
</html>
